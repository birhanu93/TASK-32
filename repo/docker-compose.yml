version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: training_assessment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: training_assessment
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-default_encryption_key_change_in_production}
      CERTIFICATE_SECRET: ${CERTIFICATE_SECRET:-default_certificate_secret_change_in_production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - appdata:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - internal
      - default
    command: >
      sh -c "
        npx knex migrate:latest --knexfile src/db/knexfile.js &&
        npx knex seed:run --knexfile src/db/knexfile.js &&
        node src/index.js
      "

networks:
  default:
    driver: bridge
  internal:
    driver: bridge
    # Enforce offline/internal: db is isolated from host network
    internal: true

volumes:
  pgdata:
  appdata:
